<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Produtos Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen text-slate-800 dark:text-slate-100 antialiased transition-colors duration-300">

    <div class="absolute top-0 left-0 right-0 h-80 bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 -z-10 opacity-95 dark:opacity-80 transition-all duration-300"></div>

    <button id="btnThemeToggle" aria-label="Alternar modo escuro" class="fixed bottom-6 right-6 z-50 bg-white dark:bg-slate-800 text-slate-700 dark:text-yellow-400 p-3.5 rounded-full shadow-2xl border border-slate-200 dark:border-slate-700 hover:scale-110 active:scale-95 transition-all duration-200 cursor-pointer">
        <span id="themeIcon" class="text-xl">🌙</span>
    </button>

    <div class="max-w-5xl mx-auto px-4 py-12 space-y-8">
        
        <header class="text-center md:text-left flex flex-col md:flex-row md:justify-between md:items-center gap-6 pb-4">
            <div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight flex items-center justify-center md:justify-start gap-2">
                    <span aria-hidden="true">📦</span> Sistema de Estoque
                </h1>
                <p class="text-indigo-100 dark:text-indigo-200 mt-1 font-light text-sm">Gerencie seus produtos com performance ultrarrápida</p>
            </div>
            
            <div class="bg-white/10 dark:bg-slate-950/40 backdrop-blur-md p-3 rounded-xl border border-white/20 dark:border-slate-800 text-left shadow-lg">
                <label for="apiUrlInput" class="block text-xxs font-semibold text-indigo-200 uppercase tracking-wider">Endpoint da API</label>
                <div class="flex gap-2 mt-1">
                    <input type="text" id="apiUrlInput" value="http://localhost:8000" class="px-3 py-1.5 text-xs text-white border border-white/20 dark:border-slate-700 rounded-lg bg-white/5 focus:bg-white/10 dark:focus:bg-slate-900/50 focus:outline-hidden focus:ring-2 focus:ring-white/40 w-52 transition-all">
                    <button id="btnSalvarUrl" class="bg-white dark:bg-indigo-600 text-indigo-700 dark:text-white px-3 py-1.5 text-xs rounded-lg hover:bg-slate-100 dark:hover:bg-indigo-700 transition-all font-semibold shadow-xs cursor-pointer active:scale-95">
                        Conectar
                    </button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            
            <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700/50 transition-all duration-300 hover:shadow-2xl">
                <div class="flex items-center gap-2 mb-5">
                    <div class="p-2 bg-indigo-50 dark:bg-indigo-950/50 text-indigo-600 dark:text-indigo-400 rounded-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </div>
                    <h2 class="text-lg font-bold text-slate-800 dark:text-white">Novo Produto</h2>
                </div>

                <form id="productForm" class="space-y-4">
                    <div>
                        <label for="name" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Nome do Produto</label>
                        <input type="text" id="name" required placeholder="Ex: Macbook Pro M3" class="mt-1 block w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-hidden focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-950 text-slate-800 dark:text-slate-100 transition-all duration-200">
                    </div>
                    <div>
                        <label for="description" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Descrição</label>
                        <textarea id="description" required rows="3" placeholder="Detalhes técnicos, especificações..." class="mt-1 block w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-hidden focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-950 text-slate-800 dark:text-slate-100 transition-all duration-200 resize-none"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 dark:bg-indigo-500 text-white py-2.5 px-4 rounded-xl hover:bg-indigo-700 dark:hover:bg-indigo-600 focus:outline-hidden focus:ring-2 focus:ring-indigo-500/50 focus:ring-offset-2 dark:focus:ring-offset-slate-800 transition-all duration-200 font-medium cursor-pointer shadow-md shadow-indigo-600/10 active:scale-[0.99]">
                        Adicionar ao Inventário
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700/50 overflow-hidden transition-all duration-300">
                <div class="p-6 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50/50 dark:bg-slate-900/20">
                    <div class="flex items-center gap-2">
                        <div class="p-2 bg-purple-50 dark:bg-purple-950/50 text-purple-600 dark:text-purple-400 rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                        </div>
                        <h2 class="text-lg font-bold text-slate-800 dark:text-white">Itens Cadastrados</h2>
                    </div>
                    <button id="btnAtualizar" aria-label="Atualizar lista de produtos" class="text-xs font-medium text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-950/50 hover:bg-indigo-100 dark:hover:bg-indigo-900 py-1.5 px-3 rounded-lg focus:outline-hidden focus:ring-2 focus:ring-indigo-500/50 transition-all duration-200 cursor-pointer flex items-center gap-1.5">
                        <span id="refreshIcon" class="inline-block transition-transform duration-500">🔄</span> 
                        <span>Atualizar</span>
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-slate-100 dark:divide-slate-700">
                        <thead class="bg-slate-50 dark:bg-slate-900/50">
                            <tr>
                                <th class="px-6 py-3.5 text-left text-xxs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">ID</th>
                                <th class="px-6 py-3.5 text-left text-xxs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Produto</th>
                                <th class="px-6 py-3.5 text-left text-xxs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Descrição</th>
                                <th class="px-6 py-3.5 text-right text-xxs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody" class="bg-white dark:bg-slate-800 divide-y divide-slate-100 dark:divide-slate-700 text-sm">
                            </tbody>
                    </table>
                </div>
                
                <div id="noProducts" class="text-center py-12 px-4 hidden">
                    <div class="text-4xl mb-2" aria-hidden="true">📦</div>
                    <p class="text-slate-400 dark:text-slate-500 text-sm font-medium">Nenhum produto indexado no momento.</p>
                    <p class="text-xs text-slate-300 dark:text-slate-600 mt-1">Verifique a conexão ou adicione um novo item.</p>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
