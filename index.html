<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Produtos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-12">

    <div class="max-w-4xl mx-auto space-y-8">
        <header class="text-center">
            <h1 class="text-3xl font-bold text-gray-800">📦 Dashboard de Produtos</h1>
            <p class="text-gray-600">Consumindo API FastAPI hospedada externamente</p>
            
            <div class="mt-4 inline-block bg-white p-3 rounded-lg shadow-sm border border-gray-200 text-left">
                <label for="apiUrlInput" class="block text-xs font-semibold text-gray-500 uppercase">URL da API do FastAPI:</label>
                <div class="flex gap-2 mt-1">
                    <input type="text" id="apiUrlInput" value="http://localhost:8000" class="px-3 py-1 text-sm border border-gray-300 rounded-md bg-gray-50 focus:bg-white focus:outline-none w-64 md:w-80">
                    <button id="btnSalvarUrl" class="bg-emerald-600 text-white px-3 py-1 text-sm rounded-md hover:bg-emerald-700 transition-colors font-medium cursor-pointer">
                        Salvar
                    </button>
                </div>
                <p class="text-xs text-gray-400 mt-1">Troque por sua URL do Render, Railway ou Ngrok se o backend não for local.</p>
            </div>
        </header>

        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Cadastrar Novo Produto</h2>
            <form id="productForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600">Nome do Produto</label>
                    <input type="text" id="name" required class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Descrição</label>
                    <textarea id="description" required rows="3" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition-colors font-medium cursor-pointer">
                    Adicionar Produto
                </button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-gray-700">Produtos Cadastrados</h2>
                <button id="btnAtualizar" class="text-sm bg-gray-200 text-gray-700 py-1 px-3 rounded-md hover:bg-gray-300 transition-colors cursor-pointer">
                    🔄 Atualizar Lista
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nome</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Descrição</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody" class="bg-white divide-y divide-gray-200">
                        </tbody>
                </table>
            </div>
            <div id="noProducts" class="text-center py-8 text-gray-500 hidden">
                Nenhum produto encontrado ou erro de conexão com a API.
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
